name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Public Supabase vars are baked into the client bundle at build time.
      # Use repo secrets when present so P0 auth tests hit the real fixture DB.
      # Fall back to dummies for fork PRs where secrets are unavailable.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://dummy-project.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY != '' && secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'dummy' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SECRET_KEY != '' && secrets.SUPABASE_SECRET_KEY || '' }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY != '' && secrets.SUPABASE_SECRET_KEY || '' }}
      PORT: 3000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Docs hygiene checks
        # Don't swallow failures with `|| echo` — that turned this into a no-op
        # gate. If docs checks legitimately need to be advisory, mark the step
        # `continue-on-error: true` so the noise is explicit in the UI.
        run: npm run ci:docs

      - name: Type check
        run: npm run type-check

      - name: Route integrity audit
        # Every declared route (ROUTES/API_ROUTES/entity registry) and every
        # emitted internal link must resolve to a real route file. Static,
        # fast — prevents the internal-link → 404 class of bug.
        run: npm run audit:routes

      - name: Lint
        # Catches the bug class that landed on main as `IntegrationNote` —
        # eslint would have flagged the undefined identifier before merge.
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit -- --watchAll=false

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000

      - name: Validate required P0 E2E env
        id: check-secrets
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_PROJECT_ID: ${{ secrets.E2E_PROJECT_ID }}
          E2E_RESET_ACCESS_TOKEN: ${{ secrets.E2E_RESET_ACCESS_TOKEN }}
          E2E_RESET_REFRESH_TOKEN: ${{ secrets.E2E_RESET_REFRESH_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          missing=0
          for key in E2E_USER_EMAIL E2E_USER_PASSWORD E2E_PROJECT_ID E2E_RESET_ACCESS_TOKEN E2E_RESET_REFRESH_TOKEN NEXT_PUBLIC_SUPABASE_URL; do
            if [ -z "${!key}" ]; then
              echo "⚠️  Missing secret: $key"
              missing=1
            else
              echo "✅ Found $key"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "⚠️  E2E secrets not configured - skipping P0 matrix tests"
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          fi

      - name: Bootstrap E2E fixture data
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/test-setup/ensure-e2e-fixtures.mjs

      - name: Run P0 workflow matrix
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          E2E_BASE_URL: http://localhost:3000
          BASE_URL: http://localhost:3000
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_PROJECT_ID: ${{ secrets.E2E_PROJECT_ID }}
          E2E_RESET_ACCESS_TOKEN: ${{ secrets.E2E_RESET_ACCESS_TOKEN }}
          E2E_RESET_REFRESH_TOKEN: ${{ secrets.E2E_RESET_REFRESH_TOKEN }}
          # Legacy aliases for global-setup and older specs
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: npm run test:e2e:matrix:p0
