name: 🚀 One-Button Deploy
# This workflow is part of the OrangeCat automated deployment system.
# See docs/deployment/DEPLOYMENT_PROCESS.md for the complete deployment process.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_tests:
        description: 'Skip tests (emergency deploy)'
        required: false
        default: false
        type: boolean
      force_deploy:
        description: 'Force deploy (bypass checks)'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: 🚀 Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📊 Log Deployment Start
        run: |
          echo "🚀 DEPLOYMENT STARTED"
          echo "📅 Time: $(date)"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "🏷️  Commit: ${{ github.sha }}"
          echo "🎯 Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "⚡ Trigger: ${{ github.event_name }}"
          echo "👤 Actor: ${{ github.actor }}"

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm ci --prefer-offline --no-audit
          echo "✅ Dependencies installed successfully"

      - name: 🧹 Code Quality Check
        if: ${{ !github.event.inputs.skip_tests }}
        run: |
          echo "🧹 Running code quality checks..."
          npm run lint
          echo "✅ Code quality check complete"

      - name: ✅ Type Check (tsc)
        if: ${{ !github.event.inputs.skip_tests }}
        run: |
          echo "🔎 Running TypeScript type-check..."
          npm run type-check
          echo "✅ Type-check passed"

      - name: 🧪 Run Tests (blocking)
        if: ${{ !github.event.inputs.skip_tests }}
        run: |
          echo "🧪 Running unit tests..."
          npm run test:unit -- --watchAll=false
          echo "✅ Unit tests complete"

      - name: 🏗️ Build Application
        if: ${{ !github.event.inputs.skip_tests }}
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: https://dummy-project.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: dummy
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
        run: |
          echo "🏗️ Building application..."
          npm run build
          echo "✅ Application built successfully"

      # Deploy with the Vercel CLI using a long-lived Personal Access
      # Token (created in the Vercel dashboard, no expiration). The
      # previous deploy-hook approach was credential-free but always
      # produced PREVIEW builds for this project (the GitHub App has
      # never produced production deploys here — verified against 100+
      # historical deployments, all source=cli). The PAT does not get
      # invalidated by `vercel login` the way the CLI session token
      # used to, so this is stable. If you ever need to rotate it,
      # generate a new one at https://vercel.com/account/tokens.
      - name: 🚀 Deploy to Vercel Production
        id: deploy
        run: |
          echo "🚀 Deploying to Vercel production..."
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "✅ Deployed: $DEPLOY_URL"
          echo "deployment_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: 🔍 Health Check
        id: health_check
        # Only run health check on production deployments (preview deployments have auth protection)
        if: github.event.inputs.environment == 'production' || github.ref_name == 'main'
        run: |
          echo "🔍 Performing health check on production..."
          HEALTH_URL="https://orangecat.ch/api/health"

          # Wait for deployment to be ready
          sleep 30

          for i in {1..10}; do
            echo "Attempt $i: Checking $HEALTH_URL"
            if curl -f -s "$HEALTH_URL" > /dev/null; then
              echo "✅ Health check passed"
              echo "health_status=healthy" >> $GITHUB_OUTPUT
              break
            else
              echo "⚠️ Health check failed, retrying in 10s..."
              sleep 10
            fi

            if [ $i -eq 10 ]; then
              echo "❌ Health check failed after 10 attempts"
              echo "health_status=unhealthy" >> $GITHUB_OUTPUT
              exit 1
            fi
          done

      - name: 📊 Deployment Summary
        if: always()
        run: |
          echo "📊 DEPLOYMENT SUMMARY"
          echo "================================"
          echo "🎯 Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "🌐 URL: ${{ steps.deploy.outputs.deployment_url }}"
          echo "🏥 Health: ${{ steps.health_check.outputs.health_status || 'unknown' }}"
          echo "⏱️  Duration: ${{ job.duration || 'calculating...' }}"
          echo "📅 Completed: $(date)"
          echo "✅ Status: ${{ job.status }}"

      - name: 🔔 Notify Success
        if: success()
        run: |
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "🌐 Production URL: https://orangecat.ch"
          echo "🔍 Monitor: https://github.com/${{ github.repository }}/actions"
          echo "📱 Share this success!"

      - name: 🚨 Handle Failure
        if: failure()
        run: |
          echo "🚨 DEPLOYMENT FAILED!"
          echo "📋 Check the logs above for details"
          echo "🔧 Common issues:"
          echo "  - Build errors"
          echo "  - Test failures" 
          echo "  - Vercel token issues"
          echo "  - Health check timeout"
          echo "🆘 Need help? Check: https://github.com/${{ github.repository }}/actions"

      - name: 🌐 Automated Browser Verification
        if: success() && (github.event.inputs.environment == 'production' || github.ref_name == 'main')
        run: |
          echo "🌐 Running automated browser verification..."
          npm run deploy:verify || echo "⚠️ Browser verification failed - manual check required"

      - name: 📈 Performance Audit
        if: success() && (github.event.inputs.environment == 'production' || github.ref_name == 'main')
        run: |
          echo "📈 Running performance audit..."
          npx lighthouse https://orangecat.ch --output=json --chrome-flags="--headless" > lighthouse.json || echo "⚠️ Lighthouse audit failed"

          if [ -f lighthouse.json ]; then
            SCORE=$(cat lighthouse.json | jq '.categories.performance.score * 100')
            echo "⚡ Performance Score: $SCORE/100"
          fi

  monitor:
    name: 📊 Post-Deploy Monitoring
    needs: deploy
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: 🔍 Extended Health Monitoring
        run: |
          echo "🔍 Starting extended health monitoring..."

          for i in {1..5}; do
            echo "Monitor check $i/5"
            
            # Check main site
            if curl -f -s "https://orangecat.ch" > /dev/null; then
              echo "✅ Main site responsive"
            else
              echo "❌ Main site unresponsive"
            fi
            
            # Check API health
            if curl -f -s "https://orangecat.ch/api/health" > /dev/null; then
              echo "✅ API healthy"
            else
              echo "❌ API unhealthy"
            fi
            
            sleep 30
          done

          echo "✅ Extended monitoring complete"

      - name: 📊 Final Status Report
        run: |
          echo "🎯 FINAL DEPLOYMENT STATUS"
          echo "=========================="
          echo "🌐 Production: https://orangecat.ch"
          echo "🏥 Health API: https://orangecat.ch/api/health"
          echo "📊 Monitoring: https://github.com/${{ github.repository }}/actions"
          echo "⏰ Completed: $(date)"
          echo "🎉 Deployment verified and monitoring active!"
