name: Uptime

# Free, off-box uptime monitor. Runs on GitHub's infrastructure (NOT the Hetzner box),
# so it keeps working — and alerts — even if the box is completely down. On failure it
# opens/refreshes a single GitHub issue (you get a notification); on recovery it closes
# it. Optional: set the DISCORD_WEBHOOK / SLACK_WEBHOOK repo secret for a chat ping too.
#
# Caveat: GitHub's scheduled runs can be delayed/dropped under load (~5–15 min granularity),
# so this is a solid free baseline, not an SLA-grade monitor. For tighter checks, add a free
# UptimeRobot monitor on https://orangecat.ch/api/health (50 monitors / 5-min, no cost).

on:
  schedule:
    - cron: '*/10 * * * *' # every ~10 min (GitHub minimum is 5; it may run late)
  workflow_dispatch: {}

permissions:
  issues: write

concurrency:
  group: uptime
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe endpoints (2 tries before declaring down — avoid transient blips)
        id: probe
        run: |
          check() {
            for try in 1 2 3; do
              code=$(curl -sS -o /tmp/body -w '%{http_code}' --max-time 20 "$1" || echo 000)
              [ "$code" = "200" ] && return 0
              sleep 10
            done
            echo "DOWN: $1 → HTTP $code"
            return 1
          }
          fail=0
          check "https://orangecat.ch/api/health" || fail=1
          # health must also report healthy, not just 200
          if [ "$fail" = 0 ] && ! grep -q '"status":"healthy"' /tmp/body 2>/dev/null; then
            echo "DOWN: health endpoint not 'healthy'"; fail=1
          fi
          # Box disk pressure — read from the health host metrics while /tmp/body is
          # still the health response (the homepage check below overwrites it).
          disk=$(jq -r '.data.host.disk_used_pct // empty' /tmp/body 2>/dev/null || true)
          echo "disk=$disk" >> "$GITHUB_OUTPUT"
          echo "Box disk used: ${disk:-unknown}%"
          # Auth (GoTrue) status — reported by /api/health but deliberately NOT part
          # of the 200/503 liveness gate (a GoTrue blip must not roll back a deploy).
          # So page on it here instead, off the critical path.
          authsvc=$(jq -r '.data.services.authentication // empty' /tmp/body 2>/dev/null || true)
          echo "auth=$authsvc" >> "$GITHUB_OUTPUT"
          echo "Auth service: ${authsvc:-unknown}"
          # Backup freshness — read while /tmp/body is still the health response. A
          # broken pg-backup timer otherwise stays silent until a restore is needed.
          backup_age=$(jq -r '.data.host.last_backup_age_hours // empty' /tmp/body 2>/dev/null || true)
          echo "backup_age=$backup_age" >> "$GITHUB_OUTPUT"
          echo "Last backup age: ${backup_age:-unknown} h"
          check "https://orangecat.ch/" || fail=1
          echo "down=$fail" >> "$GITHUB_OUTPUT"

      - name: Alert / resolve via GitHub issue (+ Telegram on transition)
        uses: actions/github-script@v9
        env:
          # Same bot fleetcrown/openclaw use — box-death (orangecat.ch = the box)
          # reaches the channel George actually watches, not just a GitHub issue.
          # Optional: absent secrets just skip the Telegram send (issue still fires).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            const down = '${{ steps.probe.outputs.down }}' === '1';
            const title = '🔴 orangecat.ch is DOWN';
            const { owner, repo } = context.repo;
            // Fire-and-forget Telegram; never let a notify failure fail the check.
            const tg = async (text) => {
              const t = process.env.TELEGRAM_BOT_TOKEN, c = process.env.TELEGRAM_CHAT_ID;
              if (!t || !c) return;
              try {
                await fetch(`https://api.telegram.org/bot${t}/sendMessage`, {
                  method: 'POST', headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({ chat_id: c, text }),
                });
              } catch (e) { core.warning(`telegram send failed: ${e}`); }
            };
            const open = (await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'uptime', per_page: 1,
            })).data[0];
            const now = new Date().toISOString();
            if (down) {
              const body = `Health check failed at ${now} (run ${context.runId}).\nProbed: /api/health + homepage.`;
              if (open) {
                await github.rest.issues.createComment({ owner, repo, issue_number: open.number, body: `Still down at ${now}.` });
              } else {
                // First DOWN transition → page Telegram (transition-only: the
                // absence of an open issue is the "was up" state).
                await github.rest.issues.create({ owner, repo, title, body, labels: ['uptime'] });
                await tg(`🔴 orangecat.ch (the bitbaum box) is DOWN as of ${now}. On-box alerts are dark when the box is dead — this is the external check.`);
              }
              core.setFailed('Site is DOWN');
            } else if (open) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.number, body: `✅ Recovered at ${now} — closing.` });
              await github.rest.issues.update({ owner, repo, issue_number: open.number, state: 'closed' });
              await tg(`✅ orangecat.ch (bitbaum) RECOVERED at ${now}.`);
            }

      # Separate, non-fatal alert: the single box is the whole failure domain, so a
      # silently-filling disk = a future hard outage. Warn early (≥85%), auto-resolve below.
      - name: Disk-pressure alert / resolve
        if: ${{ steps.probe.outputs.disk != '' }}
        uses: actions/github-script@v9
        with:
          script: |
            const disk = parseInt('${{ steps.probe.outputs.disk }}', 10);
            const THRESHOLD = 85;
            const { owner, repo } = context.repo;
            const open = (await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'disk-pressure', per_page: 1,
            })).data[0];
            const now = new Date().toISOString();
            if (Number.isFinite(disk) && disk >= THRESHOLD) {
              const body = `bitbaum root disk at **${disk}%** (≥${THRESHOLD}%) as of ${now}. Free space before it fills — old backups in /opt/backups/pg, docker prune, logs.`;
              if (open) {
                await github.rest.issues.createComment({ owner, repo, issue_number: open.number, body: `Still ${disk}% at ${now}.` });
              } else {
                await github.rest.issues.create({ owner, repo, title: `🟠 bitbaum disk ${disk}%`, body, labels: ['disk-pressure'] });
              }
            } else if (open) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.number, body: `✅ Disk back to ${disk}% at ${now} — closing.` });
              await github.rest.issues.update({ owner, repo, issue_number: open.number, state: 'closed' });
            }

      # Separate, non-fatal alert: backups run off a timer on the box, and a broken
      # timer is invisible until a restore is attempted. Alert when the newest local
      # dump is older than a day + slack (nightly cadence). Skipped when the metric is
      # absent (older build, or the app can't read the backup dir) — no false alarms.
      - name: Backup-freshness alert / resolve
        if: ${{ steps.probe.outputs.backup_age != '' }}
        uses: actions/github-script@v9
        with:
          script: |
            const ageH = parseInt('${{ steps.probe.outputs.backup_age }}', 10);
            const THRESHOLD = 26; // nightly backup + a few hours of slack
            const { owner, repo } = context.repo;
            const open = (await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'backup-stale', per_page: 1,
            })).data[0];
            const now = new Date().toISOString();
            if (Number.isFinite(ageH) && ageH >= THRESHOLD) {
              const body = `Newest local DB backup is **${ageH}h old** (≥${THRESHOLD}h) as of ${now}. The pg-backup timer may have stopped — check it before the gap widens (restic → B2 ships from these dumps).`;
              if (open) {
                await github.rest.issues.createComment({ owner, repo, issue_number: open.number, body: `Still ${ageH}h stale at ${now}.` });
              } else {
                await github.rest.issues.create({ owner, repo, title: `🟠 orangecat backups stale (${ageH}h)`, body, labels: ['backup-stale'] });
              }
            } else if (open) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.number, body: `✅ Backups fresh again (${ageH}h) at ${now} — closing.` });
              await github.rest.issues.update({ owner, repo, issue_number: open.number, state: 'closed' });
            }

      # Real GoTrue outage alert — kept off the 200/503 liveness gate so it can
      # never roll back a deploy, but a genuine auth outage still needs a page.
      - name: Auth-outage alert / resolve
        if: ${{ steps.probe.outputs.auth != '' }}
        uses: actions/github-script@v9
        with:
          script: |
            const auth = '${{ steps.probe.outputs.auth }}';
            const { owner, repo } = context.repo;
            const open = (await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'auth-outage', per_page: 1,
            })).data[0];
            const now = new Date().toISOString();
            if (auth === 'outage') {
              const body = `GoTrue auth probe reports **outage** as of ${now} (site is still up; login/signup likely failing). Check the supabase-auth container.`;
              if (open) {
                await github.rest.issues.createComment({ owner, repo, issue_number: open.number, body: `Still down at ${now}.` });
              } else {
                await github.rest.issues.create({ owner, repo, title: '🔴 orangecat auth (GoTrue) outage', body, labels: ['auth-outage'] });
              }
            } else if (open) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.number, body: `✅ Auth recovered (${auth}) at ${now} — closing.` });
              await github.rest.issues.update({ owner, repo, issue_number: open.number, state: 'closed' });
            }
